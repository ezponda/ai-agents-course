name: Deploy Jupyter Books

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Build both books (clean)
        run: |
          rm -rf courses/n8n_no_code/book/_build courses/python_code/book/_build
          jupyter-book build courses/n8n_no_code/book
          jupyter-book build courses/python_code/book

      - name: Assemble site (n8n at root, python under /python/)
        run: |
          mkdir -p _site/python
          cp -r courses/n8n_no_code/book/_build/html/. _site/
          cp -r courses/python_code/book/_build/html/. _site/python/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
